services:
  postgres:
    image: postgres:16-alpine
    container_name: teamflow-postgres
    environment:
      POSTGRES_DB: teamflow
      POSTGRES_USER: teamflow
      POSTGRES_PASSWORD: teamflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamflow -d teamflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: teamflow-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/teamflow
      SPRING_DATASOURCE_USERNAME: teamflow
      SPRING_DATASOURCE_PASSWORD: teamflow
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: teamflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:

