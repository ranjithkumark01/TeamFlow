spring.application.name=teamflow-backend
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:6730/teamflow
spring.datasource.username=postgres
spring.datasource.password=Ranjith
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.sql.init.mode=never

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

teamflow.jwt.secret=${TEAMFLOW_JWT_SECRET:teamflow-development-secret-key-that-is-long-enough-for-hs256-signing}
teamflow.jwt.expiration-ms=${TEAMFLOW_JWT_EXPIRATION_MS:3600000}

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

teamflow.upload-dir=${TEAMFLOW_UPLOAD_DIR:uploads}
teamflow.mail.enabled=${TEAMFLOW_MAIL_ENABLED:false}
